<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OpenAge Demo</title>
        <style>
            html,
            body {
                margin: 0;
                min-height: 100%;
                background: #fff;
            }

            body {
                min-height: 100vh;
                display: grid;
                place-items: center;
            }
        </style>
    </head>
    <body>
        <div id="openage-demo"></div>

        <script src="https://cdn.jsdelivr.net/npm/@tn3w/openage/dist/openage.min.js"></script>
        <script>
            OpenAge.render('#openage-demo', {
                mode: 'serverless',
                size: 'normal',
                minAge: 18,
            });
        </script>
    </body>
</html>
