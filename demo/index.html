<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenAge – Age Verification</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
        />
        <link rel="stylesheet" href="style.css" />
        <script
            src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"
            crossorigin="anonymous"
        ></script>
    </head>
    <body>
        <main id="app">
            <header class="header">
                <span class="logo">Open<strong>Age</strong></span>
                <span class="badge">on-device</span>
            </header>

            <div id="viewport" class="viewport">
                <div id="video-container" class="video-container hidden">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>

                    <div id="face-guide" class="face-guide hidden">
                        <svg viewBox="0 0 100 120" class="face-svg">
                            <ellipse
                                cx="50"
                                cy="55"
                                rx="35"
                                ry="45"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                                stroke-dasharray="6 4"
                            />
                            <ellipse
                                class="eye"
                                cx="36"
                                cy="45"
                                rx="5"
                                ry="3.5"
                                fill="currentColor"
                            />
                            <ellipse
                                class="eye"
                                cx="64"
                                cy="45"
                                rx="5"
                                ry="3.5"
                                fill="currentColor"
                            />
                            <line
                                x1="50"
                                y1="52"
                                x2="48"
                                y2="62"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            />
                            <path
                                d="M40 72 Q50 79 60 72"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            />
                        </svg>
                    </div>

                    <div id="challenge-hud" class="challenge-hud hidden">
                        <p id="challenge-text" class="challenge-text"></p>
                        <div id="challenge-progress" class="challenge-bar"></div>
                    </div>

                    <div id="video-status" class="video-status hidden">
                        <p id="video-status-text"></p>
                    </div>
                </div>

                <div id="hero" class="hero">
                    <div class="hero-icon">
                        <svg viewBox="0 0 100 120" class="face-svg idle">
                            <ellipse
                                cx="50"
                                cy="55"
                                rx="35"
                                ry="45"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.8"
                            />
                            <ellipse
                                class="eye"
                                cx="36"
                                cy="45"
                                rx="5"
                                ry="3.5"
                                fill="currentColor"
                            />
                            <ellipse
                                class="eye"
                                cx="64"
                                cy="45"
                                rx="5"
                                ry="3.5"
                                fill="currentColor"
                            />
                            <line
                                x1="50"
                                y1="52"
                                x2="48"
                                y2="62"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            />
                            <path
                                d="M40 72 Q50 79 60 72"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            />
                        </svg>
                    </div>
                    <p id="status" class="status">Initializing…</p>
                </div>
            </div>

            <div id="result-display" class="result hidden">
                <div id="result-icon"></div>
                <p id="result-text"></p>
            </div>

            <div class="actions">
                <button id="start-button" class="hidden">Begin Verification</button>
                <button id="retry-button" class="hidden">Try Again</button>
            </div>

            <footer class="footer">
                <button id="clear-button" class="link-button">Clear cached data</button>
            </footer>
        </main>

        <script type="module" src="app.js"></script>
    </body>
</html>
